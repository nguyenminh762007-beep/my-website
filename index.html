<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Oẳn Tù Tì</title>

    <style>
        body{
            text-align:center;
            font-family:Arial;
            margin-top:50px;
            background:#f0f0f0;
        }

        button{
            font-size:20px;
            padding:15px 25px;
            margin:10px;
            cursor:pointer;
        }

        #result{
            font-size:24px;
            margin-top:20px;
            font-weight:bold;
        }
    </style>
</head>

<body>

<h1>🎮 Game Oẳn Tù Tì</h1>

<button onclick="play('keo')">✌️ Kéo</button>
<button onclick="play('bua')">👊 Búa</button>
<button onclick="play('bao')">✋ Bao</button>

<h2 id="player"></h2>
<h2 id="computer"></h2>

<div id="result"></div>

<script>

function play(player){

    const choices = ["keo","bua","bao"];
    const computer = choices[Math.floor(Math.random()*3)];

    document.getElementById("player").innerHTML =
        "Bạn chọn: " + player;

    document.getElementById("computer").innerHTML =
        "Máy chọn: " + computer;

    let result="";

    if(player===computer){
        result="🤝 Hòa!";
    }
    else if(
        (player==="keo" && computer==="bao") ||
        (player==="bua" && computer==="keo") ||
        (player==="bao" && computer==="bua")
    ){
        result="🎉 Bạn thắng!";
    }
    else{
        result="😢 Máy thắng!";
    }

    document.getElementById("result").innerHTML=result;
}

</script>

</body>
</html>
